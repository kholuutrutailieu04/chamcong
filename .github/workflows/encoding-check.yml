name: Encoding Check

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  encoding:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run encoding check
        run: npm run check:encoding
